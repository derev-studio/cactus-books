<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ссылка для телефона</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a2744;
      color: #e8ecf4;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; font-weight: 600; }
    .url {
      background: rgba(255,255,255,0.1);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      word-break: break-all;
      font-size: 1rem;
      margin-bottom: 1rem;
      user-select: all;
      -webkit-user-select: all;
    }
    .hint { font-size: 0.9rem; color: #8b949e; margin-bottom: 1.5rem; text-align: center; }
    .qr { margin: 0.5rem 0; }
    .qr img { display: block; border-radius: 8px; }
    a { color: #d4a84b; }
  </style>
</head>
<body>
  <h1>Откройте эту ссылку на телефоне</h1>
  <p class="hint">Скопируйте ссылку ниже или отсканируйте QR-код камерой телефона</p>
  <div class="url" id="url">—</div>
  <div class="qr" id="qr"></div>
  <p class="hint"><a href="index.html">На главную сайта</a></p>
  <script>
    var base = window.location.origin;
    document.getElementById('url').textContent = base;
    document.getElementById('qr').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(base) + '" width="220" height="220" alt="QR" />';
  </script>
</body>
</html>
